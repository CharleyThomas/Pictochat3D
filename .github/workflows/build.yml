name: C/C++ CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm
    
    steps:
    - uses: actions/checkout@v4

    # 1. Install the official 3DS dev environment package using local container cache
    - name: Install Official 3DS Build Tools
      run: |
        dkp-pacman -S --noconfirm 3ds-dev

    # 2. Build the main production app
    - name: Build Main App
      run: |
        make clean
        make
    
    # Rename files to match your preferred artifact names
    - name: Prepare App Files
      run: |
        cp FourthTube.cia Better_FourthTube.cia
        cp Better_FourthTube.3dsx main_app_backup.3dsx

    # 3. Clean intermediate files (Keeps workspace light)
    - name: Clean Build Space
      run: make clean

    # Restore the backup name for uploading
    - name: Restore Main App 3dsx Name
      run: mv main_app_backup.3dsx Better_FourthTube.3dsx

    # 4. Upload files as 2 separate, unnested artifacts
    - name: Upload Better_FourthTube.3dsx
      uses: actions/upload-artifact@v4
      with:
        name: Better_FourthTube-${{ github.run_number }}.3dsx
        path: Better_FourthTube.3dsx

    - name: Upload Better_FourthTube.cia
      uses: actions/upload-artifact@v4
      with:
        name: Better_FourthTube-${{ github.run_number }}.cia
        path: Better_FourthTube.cia
