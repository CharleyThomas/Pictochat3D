name: Build 3DS Homebrew

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          apt-get update && apt-get install -y curl p7zip-full build-essential libpng-dev

      - name: Install makerom
        run: |
          curl -L -o /usr/local/bin/makerom https://github.com/proxam/makerom/releases/download/v0.18.4/makerom-x86_64-linux-gnu
          chmod +x /usr/local/bin/makerom

      - name: Compile bannertool from source
        run: |
          # Force Git to use HTTPS instead of the dead git:// protocol
          git config --global url."
