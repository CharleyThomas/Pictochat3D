name: Build 3DS Homebrew

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build project
        run: |
          make

      - name: Upload 3DSX File
        uses: actions/upload-artifact@v4
        with:
          name: PictoChat3D.3dsx
          path: PictoChat3D.3dsx

      - name: Upload ELF Debug File
        uses: actions/upload-artifact@v4
        with:
          name: PictoChat3D.elf
          path: PictoChat3D.elf
