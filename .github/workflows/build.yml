name: C/C++ CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm
    
    steps:
    - uses: actions/checkout@v4

    # 1. Download official, compiled makerom binary directly from the source release
    - name: Install makerom
      run: |
        apt-get update && apt-get install -y curl
        curl -L -o /usr/local/bin/makerom https://github.com/3DSguy/Project_公開/releases/download/v0.17/makerom-x86_64-linux-gnu
        chmod +x /usr/local/bin/makerom

    # 2. Build the main production app
    - name: Build Main App
      run: |
        make clean
        make
    
    # 3. Rename files to match your preferred artifact names
    - name: Prepare App Files
      run: |
        cp PictoChat3D.3dsx Better_FourthTube.3dsx || cp FourthTube.3dsx Better_FourthTube.3dsx || true
        cp PictoChat3D.cia Better_FourthTube.cia || cp FourthTube.cia Better_FourthTube.cia || true

    # 4. Upload files as 2 separate, unnested artifacts
    - name: Upload Better_FourthTube.3dsx
      uses: actions/upload-artifact@v4
      with:
        name: Better_FourthTube-${{ github.run_number }}.3dsx
        path: Better_FourthTube.3dsx

    - name: Upload Better_FourthTube.cia
      uses: actions/upload-artifact@v4
      with:
        name: Better_FourthTube-${{ github.run_number }}.cia
        path: Better_FourthTube.cia
