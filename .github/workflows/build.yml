name: Build 3DS Homebrew

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          apt-get update && apt-get install -y curl p7zip-full build-essential libpng-dev python3

      - name: Install makerom
        run: |
          curl -L -o /usr/local/bin/makerom https://github.com/proxam/makerom/releases/download/v0.18.4/makerom-x86_64-linux-gnu
          chmod +x /usr/local/bin/makerom

      - name: Compile bannertool from source
        run: |
          git config --global url.https://github.com/.insteadOf git://github.com/
          git clone --recursive https://github.com/Epicpkmn11/bannertool.git
          cd bannertool
          make
          cp output/linux-x86_64/bannertool /usr/local/bin/bannertool
          chmod +x /usr/local/bin/bannertool
          cd ..
          rm -rf bannertool

      - name: Generate Dummy Icon Image
        run: |
          python3 -c "import base64; open('dummy.png', 'wb').write(base64.b64decode('iVBORw0KGgoAAAANSUhEUgAAADAAAAAwCAYAAABXAvmHAAAABmJLR0QA/wD/AP+gvaeTAAAAI0lEQVRoge3OMQEAAAwCoNm/tOnBhVbAn0pSgUAgEAgEAoFAQO4CH3UBCY9917MAAAAASUVORK5CYII='))"

      - name: Build project
        run: |
          make

      - name: Upload 3DSX File
        uses: actions/upload-artifact@v4
        with:
          name: PictoChat3D.3dsx
          path: PictoChat3D.3dsx

      - name: Upload CIA Installer
        uses: actions/upload-artifact@v4
        with:
          name: PictoChat3D.cia
          path: PictoChat3D.cia
